; Configuración PHP para Laravel en Ferozo
; Este archivo va en la raíz del proyecto (document root en Ferozo)
; El built-in server de PHP (php artisan serve) ignora .user.ini

; Aumentar límites de memoria y tiempo
memory_limit = 256M
max_execution_time = 300
upload_max_filesize = 20M
post_max_size = 25M

; Configurar open_basedir para permitir acceso a directorios de Laravel
open_basedir = /home/honda/public_html:/tmp:/usr/share/php

; Logs
display_errors = Off
log_errors = On
error_log = ../storage/logs/php-errors.log

; Configuración de sesiones
session.save_path = ../storage/framework/sessions
session.gc_maxlifetime = 7200

; Deshabilitar funciones peligrosas
disable_functions = exec,passthru,shell_exec,system,proc_open,popen,curl_exec,curl_multi_exec,parse_ini_file,show_source
